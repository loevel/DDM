name = "ddm-wigs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "build/client"

[[d1_databases]]
binding = "DB"
database_name = "ddm-wigs-db"
database_id = "0047be0b-294e-471a-b4dd-f94204bb9081"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "ddm-wigs-assets"

[[kv_namespaces]]
binding = "CACHE"
id = "5927b4f2125d40af8892a7edf81f4802"

[vars]
ENVIRONMENT = "production"
CF_ACCOUNT_ID = ""     # à remplir — visible dans le tableau de bord Cloudflare (URL: dash.cloudflare.com → Images)
CF_ACCOUNT_HASH = ""   # à remplir — visible dans Images → "Account Hash"
STRIPE_PUBLISHABLE_KEY = "pk_test_51To5SLCwRXKOK4kRwNv5H4nDUA3rP7rAIcjeqEvwKnAUMcOQkQsU2tLx1oSY60uO9w9lt20ucobWBM4nvJpet8zY00TzK56XYk"
# Secrets (à ajouter dans Cloudflare Pages → Settings → Environment variables) :
# RESEND_API_KEY        — resend.com → API Keys → Create API Key
# CF_IMAGES_TOKEN    — token Cloudflare Images
# STRIPE_SECRET_KEY  — Stripe → Developers → API keys → Secret key (sk_live_...)
# STRIPE_WEBHOOK_SECRET — Stripe → Developers → Webhooks → Signing secret (whsec_...)
