<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-circle { fill: none; stroke: #1a1a1a; stroke-width: 8; }
      .logo-circle-inner { fill: none; stroke: #1a1a1a; stroke-width: 2; }
      .logo-text-ddm { fill: #1a1a1a; font-family: 'Georgia', serif; font-size: 72px; font-weight: bold; letter-spacing: 4px; }
      .logo-text-subtitle { fill: #1a1a1a; font-family: 'Georgia', serif; font-size: 18px; letter-spacing: 2px; }
      .logo-text-domain { fill: #1a1a1a; font-family: 'Georgia', serif; font-size: 14px; letter-spacing: 1px; }
      .hair-line { stroke: #1a1a1a; stroke-width: 2; fill: none; }
      .face { fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Circles background -->
  <circle cx="200" cy="200" r="190" class="logo-circle"/>
  <circle cx="200" cy="200" r="185" class="logo-circle-inner"/>

  <!-- Woman profile illustration -->
  <g transform="translate(160, 80)">
    <!-- Head -->
    <circle cx="40" cy="40" r="28" class="face" opacity="0.1"/>

    <!-- Hair flowing -->
    <path d="M 35 15 Q 30 25, 32 40 Q 28 50, 35 58 Q 42 65, 50 62 Q 58 58, 60 50 Q 65 40, 62 28 Q 60 18, 50 12 Q 42 8, 35 15 Z" class="face" opacity="0.2"/>

    <!-- Flower crown -->
    <circle cx="32" cy="10" r="3" class="face"/>
    <circle cx="42" cy="8" r="3" class="face"/>
    <circle cx="52" cy="10" r="3" class="face"/>
    <circle cx="58" cy="16" r="2.5" class="face"/>

    <!-- Profile face outline -->
    <path d="M 40 12 Q 50 10, 58 18 Q 62 25, 62 35 Q 62 50, 55 60 Q 48 68, 40 70" class="hair-line" stroke-width="1.5"/>

    <!-- Hair strands detail -->
    <path d="M 32 20 Q 28 30, 29 45" class="hair-line" stroke-width="1" opacity="0.6"/>
    <path d="M 38 15 Q 35 28, 36 48" class="hair-line" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Main text DDM -->
  <text x="200" y="240" text-anchor="middle" class="logo-text-ddm">DDM</text>

  <!-- Decorative elements around text -->
  <g opacity="0.3">
    <path d="M 100 220 Q 120 210, 140 215" class="hair-line" stroke-width="1"/>
    <path d="M 260 215 Q 280 210, 300 220" class="hair-line" stroke-width="1"/>
  </g>

  <!-- Subtitle -->
  <text x="200" y="280" text-anchor="middle" class="logo-text-subtitle">WIGS AND MORE</text>

  <!-- Domain -->
  <text x="200" y="320" text-anchor="middle" class="logo-text-domain">ddmwigs.com</text>

  <!-- Decorative flourishes -->
  <g opacity="0.3">
    <circle cx="120" cy="140" r="2" fill="#1a1a1a"/>
    <circle cx="280" cy="140" r="2" fill="#1a1a1a"/>
    <circle cx="100" cy="260" r="1.5" fill="#1a1a1a"/>
    <circle cx="300" cy="260" r="1.5" fill="#1a1a1a"/>
  </g>
</svg>